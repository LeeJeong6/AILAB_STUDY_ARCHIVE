<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-primary: #6A7C9C;
      --color-dark: #151D2A;
      --color-text: #000000;
      --color-text-secondary: #757575;
      --color-bg: #FFFFFF;
      --color-bg-secondary: #F7F7F7;
      --color-accent: #116dff;
      --color-border: #C7C7C7;

      --site-width: 980px;
      --border-radius: 5px;
      --shadow: 0 1px 4px rgba(0,0,0,.6);
      --transition: 0.4s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Roboto', 'Noto Sans KR', sans-serif;
      font-size: 16px;
      line-height: 1.4em;
    }

    .header {
      width: 100%;
      background: var(--color-bg);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: var(--site-width);
      margin: 0 auto;
      padding: 1.2rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-dark);
      margin: 0;
      cursor: pointer;
      transition: color var(--transition);
    }

    .site-title:hover {
      color: var(--color-primary);
    }

    .lab-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      background: var(--color-primary);
      color: var(--color-bg);
      border-radius: var(--border-radius);
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background-color var(--transition);
    }

    .lab-link:hover {
      background: var(--color-dark);
    }

    .container {
      max-width: var(--site-width);
      margin: 0 auto;
      padding: 0 1rem;
    }

    .main {
      padding: 2rem 0 4rem;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--color-border);
    }

    .back-link {
      text-decoration: none;
      color: var(--color-primary);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color var(--transition);
    }

    .back-link:hover {
      color: var(--color-dark);
    }

    .category-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-dark);
    }

    .upload-section {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .upload-section h3 {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--color-dark);
      margin-bottom: 1rem;
    }

    .upload-toggle-btn {
      border: none;
      border-radius: var(--border-radius);
      background: var(--color-primary);
      color: var(--color-bg);
      padding: 0.65rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color var(--transition);
      margin-bottom: 2rem;
      display: inline-block;
    }

    .upload-toggle-btn:hover {
      background: var(--color-dark);
    }

    .upload-form-container {
      display: none;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .upload-form-container.active {
      display: block;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .field {
      display: grid;
      gap: 0.4rem;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--color-text);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg);
      color: var(--color-text);
      padding: 0.6rem 0.8rem;
      font: inherit;
      resize: vertical;
      transition: border-color var(--transition);
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    textarea {
      min-height: 100px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .save-btn {
      border: none;
      border-radius: var(--border-radius);
      background: var(--color-primary);
      color: var(--color-bg);
      padding: 0.65rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color var(--transition);
    }

    .save-btn:hover {
      background: var(--color-dark);
    }

    .save-btn:disabled {
      background: var(--color-border);
      cursor: not-allowed;
    }

    .save-msg {
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      min-height: 1.2em;
    }

    .save-msg.success {
      color: #31B081;
    }

    .save-msg.error {
      color: #e74c3c;
    }

    .entry-list {
      display: grid;
      gap: 1.25rem;
    }

    .entry-card {
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg);
      padding: 1.5rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      transition: all var(--transition);
      cursor: grab;
      position: relative;
    }

    .entry-card:hover {
      box-shadow: var(--shadow);
    }

    .entry-card.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .entry-card.drag-over {
      border-top: 3px solid var(--color-primary);
    }

    .drag-handle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 1.2rem;
      color: var(--color-text-secondary);
      cursor: grab;
      user-select: none;
    }

    .entry-meta {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-bottom: 0.75rem;
    }

    .entry-title {
      font-size: 1.25rem;
      line-height: 1.35;
      color: var(--color-dark);
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .entry-desc {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--color-text-secondary);
      white-space: pre-wrap;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .entry-file {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      padding: 0.5rem 0;
      border-top: 1px solid var(--color-border);
      margin-bottom: 0.75rem;
    }

    .entry-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .entry-actions button,
    .entry-actions a {
      text-decoration: none;
      border: 1px solid var(--color-primary);
      border-radius: var(--border-radius);
      background: var(--color-bg);
      color: var(--color-primary);
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all var(--transition);
      cursor: pointer;
      font-family: inherit;
      display: inline-block;
    }

    .entry-actions button:hover,
    .entry-actions a:hover {
      background: var(--color-primary);
      color: var(--color-bg);
    }

    .entry-actions .delete-btn {
      border-color: #e74c3c;
      color: #e74c3c;
    }

    .entry-actions .delete-btn:hover {
      background: #e74c3c;
      color: var(--color-bg);
    }

    .entry-empty {
      border: 1px dashed var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg-secondary);
      padding: 2rem;
      color: var(--color-text-secondary);
      font-size: 0.95rem;
      text-align: center;
    }

    footer {
      border-top: 1px solid var(--color-border);
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 0.85rem;
      padding: 2rem 1rem;
      background: var(--color-bg-secondary);
    }

    @media (max-width: 640px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .toolbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .category-title {
        font-size: 1.5rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="site-title">Lab Seminar Archive</h1>
      <a class="lab-link" href="https://ailab.kookmin.ac.kr/" target="_blank" rel="noreferrer noopener">KMU AI LAB</a>
    </div>
  </header>

  <main class="container main">
    <section class="toolbar">
      <a class="back-link" href="index.html">← Back to Home</a>
      <h2 class="category-title" id="categoryTitle"></h2>
    </section>

    <section>
      <h2 style="font-size: 1.25rem; font-weight: 700; color: var(--color-dark); margin-bottom: 1.5rem;">Uploaded Materials</h2>
      <div class="entry-list" id="entryList"></div>
    </section>

    <button class="upload-toggle-btn" id="uploadToggleBtn">📤 Upload New Material</button>

    <div class="upload-form-container" id="uploadFormContainer">
      <section class="upload-section">
        <h3>📤 Upload New Material</h3>
        <form id="uploadForm" novalidate>
          <div class="form-grid">
            <div class="field">
              <label for="dateInput">Date</label>
              <input id="dateInput" name="date" type="date" required />
            </div>
            <div class="field">
              <label for="presenterInput">Presenter</label>
              <input id="presenterInput" name="presenter" type="text" placeholder="e.g., John Doe" required />
            </div>
            <div class="field field-full">
              <label for="titleInput">Title</label>
              <input id="titleInput" name="title" type="text" placeholder="Enter title" required />
            </div>
            <div class="field field-full">
              <label for="descInput">Description</label>
              <textarea id="descInput" name="description" placeholder="Enter description" required></textarea>
            </div>
            <div class="field field-full">
              <label for="fileInput">File (PDF, PPT, PPTX)</label>
              <input id="fileInput" name="file" type="file" accept=".pdf,.ppt,.pptx,application/pdf,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation" required />
            </div>
          </div>
          <div class="actions">
            <button class="save-btn" type="submit" id="submitBtn">Upload</button>
            <span class="save-msg" id="saveMsg"></span>
          </div>
        </form>
      </section>
    </div>
  </main>

  <footer>
    &copy; 2026 KMU AI Lab. All rights reserved.
  </footer>

  <script>
    const DB_NAME = 'lab-seminar-archive-db';
    const DB_VERSION = 1;
    const UPLOAD_STORE = 'uploads';

    const CATEGORY_META = {
      paper: { label: 'Paper Seminar' },
      vibe: { label: 'Vibe Coding' },
      math: { label: 'Math Study' }
    };

    const STATIC_ENTRIES = [
      {
        id: 'seed-paper-2026-03-20',
        category: 'paper',
        date: '2026-03-20',
        presenter: 'Jeongik Lee',
        title: 'GroupViT: Semantic Segmentation Emerges from Text Supervision',
        description: 'Session covering GroupViT architecture and experimental results with text-based supervision for segmentation.',
        fileName: '2026-03-20-groupvit.html',
        staticLink: '2026-03-20-groupvit.html',
        kind: 'seed',
        createdAt: '2026-03-20T09:00:00.000Z'
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const category = params.get('cat');

    if (!CATEGORY_META[category]) {
      window.location.replace('index.html');
      throw new Error('Invalid category parameter');
    }

    const categoryTitle = document.getElementById('categoryTitle');
    const uploadForm = document.getElementById('uploadForm');
    const saveMsg = document.getElementById('saveMsg');
    const submitBtn = document.getElementById('submitBtn');
    const entryList = document.getElementById('entryList');

    categoryTitle.textContent = CATEGORY_META[category].label;

    // Upload form toggle
    const uploadToggleBtn = document.getElementById('uploadToggleBtn');
    const uploadFormContainer = document.getElementById('uploadFormContainer');

    uploadToggleBtn.addEventListener('click', () => {
      uploadFormContainer.classList.toggle('active');
      if (uploadFormContainer.classList.contains('active')) {
        uploadToggleBtn.textContent = '❌ Close Upload Form';
      } else {
        uploadToggleBtn.textContent = '📤 Upload New Material';
      }
    });

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(UPLOAD_STORE)) {
            const uploadStore = db.createObjectStore(UPLOAD_STORE, { keyPath: 'id' });
            uploadStore.createIndex('category', 'category', { unique: false });
            uploadStore.createIndex('date', 'date', { unique: false });
            uploadStore.createIndex('order', 'order', { unique: false });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function withStore(mode, handler) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(UPLOAD_STORE, mode);
        const store = tx.objectStore(UPLOAD_STORE);

        let result;
        try {
          result = handler(store);
        } catch (error) {
          reject(error);
          return;
        }

        tx.oncomplete = () => resolve(result);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function loadEntries() {
      try {
        const db = await openDatabase();
        const uploads = await new Promise((resolve, reject) => {
          const tx = db.transaction(UPLOAD_STORE, 'readonly');
          const store = tx.objectStore(UPLOAD_STORE);
          const request = store.getAll();
          request.onsuccess = () => resolve(request.result || []);
          request.onerror = () => reject(request.error);
        });

        const merged = [...STATIC_ENTRIES, ...uploads]
          .filter((entry) => entry.category === category)
          .map((entry) => ({
            ...entry,
            description: entry.description || 'No description available.'
          }));

        merged.sort((a, b) => {
          // If both have order property, use it
          if (typeof a.order === 'number' && typeof b.order === 'number') {
            return a.order - b.order;
          }
          // If only one has order, prioritize it
          if (typeof a.order === 'number') return -1;
          if (typeof b.order === 'number') return 1;

          // Otherwise, use date sorting
          const dateCompare = String(b.date || '').localeCompare(String(a.date || ''));
          if (dateCompare !== 0) {
            return dateCompare;
          }
          return String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
        });

        return merged;
      } catch (error) {
        console.error(error);
        return [];
      }
    }

    async function saveEntry(entry) {
      await withStore('readwrite', (store) => store.put(entry));
    }

    async function deleteEntry(id) {
      await withStore('readwrite', (store) => store.delete(id));
    }

    function setMessage(text, type = 'normal') {
      saveMsg.textContent = text;
      saveMsg.className = 'save-msg';
      if (type === 'success') saveMsg.classList.add('success');
      if (type === 'error') saveMsg.classList.add('error');
    }

    function isAllowedFile(name) {
      const lower = String(name || '').toLowerCase();
      return lower.endsWith('.pdf') || lower.endsWith('.ppt') || lower.endsWith('.pptx');
    }

    function createEntryNode(entry) {
      const card = document.createElement('article');
      card.className = 'entry-card';
      card.setAttribute('draggable', 'true');
      card.dataset.entryId = entry.id;

      // Add drag handle
      const dragHandle = document.createElement('span');
      dragHandle.className = 'drag-handle';
      dragHandle.textContent = '⋮⋮';
      dragHandle.title = 'Drag to reorder';

      const meta = document.createElement('p');
      meta.className = 'entry-meta';
      meta.textContent = `${entry.date || '-'} · ${entry.presenter || '-'}`;

      const title = document.createElement('h3');
      title.className = 'entry-title';
      title.textContent = entry.title || '(No Title)';

      const desc = document.createElement('p');
      desc.className = 'entry-desc';
      desc.textContent = entry.description || '';

      const file = document.createElement('p');
      file.className = 'entry-file';
      file.textContent = `File: ${entry.fileName || '-'}`;

      const actions = document.createElement('div');
      actions.className = 'entry-actions';

      // View Session link (for both seed and upload)
      const viewLink = document.createElement('a');
      if (entry.kind === 'seed' && entry.staticLink) {
        viewLink.href = entry.staticLink;
        viewLink.target = '_blank';
        viewLink.rel = 'noreferrer noopener';
      } else {
        viewLink.href = `session.html?id=${entry.id}&cat=${category}`;
      }
      viewLink.textContent = 'View Session';
      actions.appendChild(viewLink);

      // Delete Session button (for all types except static seed entries)
      if (entry.kind !== 'seed') {
        const deleteSessionBtn = document.createElement('button');
        deleteSessionBtn.type = 'button';
        deleteSessionBtn.textContent = 'Delete Session';
        deleteSessionBtn.className = 'delete-btn';
        deleteSessionBtn.addEventListener('click', async () => {
          const ok = window.confirm('Are you sure you want to delete this session? This action cannot be undone.');
          if (!ok) {
            return;
          }
          await deleteEntry(entry.id);
          await renderEntries();
        });
        actions.appendChild(deleteSessionBtn);
      }

      if (entry.kind === 'upload' && entry.fileBlob) {
        const openBtn = document.createElement('button');
        openBtn.type = 'button';
        openBtn.textContent = 'Open File';
        openBtn.addEventListener('click', () => {
          const url = URL.createObjectURL(entry.fileBlob);
          window.open(url, '_blank', 'noopener,noreferrer');
          setTimeout(() => URL.revokeObjectURL(url), 8000);
        });
        actions.appendChild(openBtn);

        const downloadBtn = document.createElement('button');
        downloadBtn.type = 'button';
        downloadBtn.textContent = 'Download';
        downloadBtn.addEventListener('click', () => {
          const url = URL.createObjectURL(entry.fileBlob);
          const a = document.createElement('a');
          a.href = url;
          a.download = entry.fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 8000);
        });
        actions.appendChild(downloadBtn);
      }

      card.append(dragHandle, meta, title, desc, file, actions);
      return card;
    }

    async function renderEntries() {
      const entries = await loadEntries();
      entryList.innerHTML = '';

      if (entries.length === 0) {
        const empty = document.createElement('p');
        empty.className = 'entry-empty';
        empty.textContent = 'No uploaded items yet.';
        entryList.appendChild(empty);
        return;
      }

      entries.forEach((entry) => {
        const card = createEntryNode(entry);
        setupDragHandlers(card);
        entryList.appendChild(card);
      });
    }

    let draggedElement = null;

    function setupDragHandlers(card) {
      card.addEventListener('dragstart', (e) => {
        draggedElement = card;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });

      card.addEventListener('dragend', (e) => {
        card.classList.remove('dragging');
        draggedElement = null;
        // Remove all drag-over classes
        document.querySelectorAll('.entry-card').forEach(c => c.classList.remove('drag-over'));
      });

      card.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (draggedElement && draggedElement !== card) {
          card.classList.add('drag-over');
        }
      });

      card.addEventListener('dragleave', (e) => {
        card.classList.remove('drag-over');
      });

      card.addEventListener('drop', async (e) => {
        e.preventDefault();
        card.classList.remove('drag-over');

        if (!draggedElement || draggedElement === card) return;

        // Reorder the cards visually
        const allCards = Array.from(entryList.querySelectorAll('.entry-card'));
        const draggedIndex = allCards.indexOf(draggedElement);
        const targetIndex = allCards.indexOf(card);

        if (draggedIndex < targetIndex) {
          card.after(draggedElement);
        } else {
          card.before(draggedElement);
        }

        // Update order in database
        await updateOrder();
      });
    }

    async function updateOrder() {
      const cards = Array.from(entryList.querySelectorAll('.entry-card'));
      const db = await openDatabase();

      const updates = cards.map((card, index) => {
        const entryId = card.dataset.entryId;
        return { id: entryId, order: index };
      });

      // Update all entries with new order
      for (const update of updates) {
        const tx = db.transaction(UPLOAD_STORE, 'readwrite');
        const store = tx.objectStore(UPLOAD_STORE);
        const getRequest = store.get(update.id);

        await new Promise((resolve, reject) => {
          getRequest.onsuccess = () => {
            const entry = getRequest.result;
            if (entry) {
              entry.order = update.order;
              store.put(entry);
            }
          };
          tx.oncomplete = resolve;
          tx.onerror = reject;
        });
      }
    }

    uploadForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(uploadForm);
      const date = String(formData.get('date') || '').trim();
      const presenter = String(formData.get('presenter') || '').trim();
      const title = String(formData.get('title') || '').trim();
      const description = String(formData.get('description') || '').trim();
      const file = formData.get('file');

      if (!date || !presenter || !title || !description || !(file instanceof File) || !file.name) {
        setMessage('Please fill in all fields.', 'error');
        return;
      }

      if (!isAllowedFile(file.name)) {
        setMessage('Only PDF, PPT, PPTX files are allowed.', 'error');
        return;
      }

      submitBtn.disabled = true;
      setMessage('Uploading...', 'normal');

      try {
        // Create entry without AI processing
        const entry = {
          id: crypto.randomUUID(),
          category,
          date,
          presenter,
          title,
          description,
          fileName: file.name,
          fileBlob: file,
          kind: 'upload',
          createdAt: new Date().toISOString()
        };

        await saveEntry(entry);

        setMessage('Successfully uploaded!', 'success');
        uploadForm.reset();
        await renderEntries();

        // Close the upload form after successful upload
        setTimeout(() => {
          uploadFormContainer.classList.remove('active');
          uploadToggleBtn.textContent = '📤 Upload New Material';
          setMessage('', 'normal');
        }, 1500);
      } catch (error) {
        console.error(error);
        setMessage('An error occurred during upload.', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    // Add click handler for site title
    document.querySelector('.site-title').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    renderEntries();
  </script>
</body>
</html>
